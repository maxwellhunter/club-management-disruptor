<!DOCTYPE html>
<html>
<head>
  <title>ClubOS Icon Generator</title>
  <style>
    body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #1a1a1a; font-family: system-ui; }
    canvas { border: 1px solid #333; }
    button { margin-top: 16px; padding: 12px 24px; font-size: 16px; cursor: pointer; background: #16a34a; color: white; border: none; border-radius: 8px; }
    p { color: #aaa; margin-top: 8px; font-size: 14px; }
  </style>
</head>
<body>
  <canvas id="icon" width="1024" height="1024"></canvas>
  <button onclick="download()">Download icon.png</button>
  <p>1024 x 1024 — Expo app icon</p>

  <script>
    const canvas = document.getElementById('icon');
    const ctx = canvas.getContext('2d');
    const W = 1024;
    const H = 1024;

    // ─── Background ────────────────────────────────────
    ctx.fillStyle = '#16a34a';
    ctx.fillRect(0, 0, W, H);

    // ─── Shield shape (centered, white) ─────────────────
    const shieldX = W / 2;
    const shieldTop = 160;
    const shieldWidth = 520;
    const shieldHeight = 700;
    const halfW = shieldWidth / 2;

    ctx.beginPath();
    // Top-left corner (rounded)
    ctx.moveTo(shieldX - halfW + 40, shieldTop);
    // Top edge
    ctx.lineTo(shieldX + halfW - 40, shieldTop);
    // Top-right rounded corner
    ctx.quadraticCurveTo(shieldX + halfW, shieldTop, shieldX + halfW, shieldTop + 40);
    // Right side straight down to curve point
    ctx.lineTo(shieldX + halfW, shieldTop + shieldHeight * 0.55);
    // Bottom-right curve to point
    ctx.quadraticCurveTo(shieldX + halfW, shieldTop + shieldHeight * 0.78, shieldX, shieldTop + shieldHeight);
    // Bottom-left curve from point
    ctx.quadraticCurveTo(shieldX - halfW, shieldTop + shieldHeight * 0.78, shieldX - halfW, shieldTop + shieldHeight * 0.55);
    // Left side back up
    ctx.lineTo(shieldX - halfW, shieldTop + 40);
    // Top-left rounded corner
    ctx.quadraticCurveTo(shieldX - halfW, shieldTop, shieldX - halfW + 40, shieldTop);
    ctx.closePath();

    // White shield fill
    ctx.fillStyle = '#ffffff';
    ctx.fill();

    // ─── Inner shield outline (green, inset) ────────────
    const inset = 24;
    const innerTop = shieldTop + inset;
    const innerHalfW = halfW - inset;
    const innerHeight = shieldHeight - inset * 1.5;

    ctx.beginPath();
    ctx.moveTo(shieldX - innerHalfW + 36, innerTop);
    ctx.lineTo(shieldX + innerHalfW - 36, innerTop);
    ctx.quadraticCurveTo(shieldX + innerHalfW, innerTop, shieldX + innerHalfW, innerTop + 36);
    ctx.lineTo(shieldX + innerHalfW, innerTop + innerHeight * 0.55);
    ctx.quadraticCurveTo(shieldX + innerHalfW, innerTop + innerHeight * 0.78, shieldX, innerTop + innerHeight);
    ctx.quadraticCurveTo(shieldX - innerHalfW, innerTop + innerHeight * 0.78, shieldX - innerHalfW, innerTop + innerHeight * 0.55);
    ctx.lineTo(shieldX - innerHalfW, innerTop + 36);
    ctx.quadraticCurveTo(shieldX - innerHalfW, innerTop, shieldX - innerHalfW + 36, innerTop);
    ctx.closePath();

    ctx.strokeStyle = '#16a34a';
    ctx.lineWidth = 6;
    ctx.stroke();

    // ─── Horizontal divider line across shield ──────────
    const dividerY = shieldTop + shieldHeight * 0.38;
    // Calculate shield width at divider height
    const divLineInset = 50;
    ctx.beginPath();
    ctx.moveTo(shieldX - halfW + divLineInset, dividerY);
    ctx.lineTo(shieldX + halfW - divLineInset, dividerY);
    ctx.strokeStyle = '#16a34a';
    ctx.lineWidth = 5;
    ctx.stroke();

    // ─── "C" lettermark (green, upper portion) ──────────
    ctx.font = 'bold 300px "Georgia", "Times New Roman", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#16a34a';
    ctx.fillText('C', shieldX, shieldTop + shieldHeight * 0.22);

    // ─── "ClubOS" text (green, lower portion) ───────────
    ctx.font = '600 72px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#16a34a';
    ctx.letterSpacing = '8px';
    ctx.fillText('CLUBOS', shieldX, shieldTop + shieldHeight * 0.56);

    // ─── Small decorative dots ──────────────────────────
    const dotY = shieldTop + shieldHeight * 0.47;
    const dotSpacing = 24;
    const dotR = 5;
    ctx.fillStyle = '#16a34a';
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.arc(shieldX + i * dotSpacing, dotY, dotR, 0, Math.PI * 2);
      ctx.fill();
    }

    // ─── Est. year text ─────────────────────────────────
    ctx.font = '500 42px system-ui, -apple-system, sans-serif';
    ctx.fillStyle = '#16a34a';
    ctx.fillText('EST. 2025', shieldX, shieldTop + shieldHeight * 0.68);

    // ─── Small crossed golf clubs below text ────────────
    const clubCenterX = shieldX;
    const clubCenterY = shieldTop + shieldHeight * 0.80;
    const clubLen = 60;

    ctx.strokeStyle = '#16a34a';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';

    // Left club (angled)
    ctx.beginPath();
    ctx.moveTo(clubCenterX - clubLen * 0.7, clubCenterY - clubLen * 0.5);
    ctx.lineTo(clubCenterX + clubLen * 0.7, clubCenterY + clubLen * 0.5);
    ctx.stroke();

    // Right club (angled other way)
    ctx.beginPath();
    ctx.moveTo(clubCenterX + clubLen * 0.7, clubCenterY - clubLen * 0.5);
    ctx.lineTo(clubCenterX - clubLen * 0.7, clubCenterY + clubLen * 0.5);
    ctx.stroke();

    // Small circle at intersection
    ctx.beginPath();
    ctx.arc(clubCenterX, clubCenterY, 8, 0, Math.PI * 2);
    ctx.fillStyle = '#16a34a';
    ctx.fill();

    // ─── Download helper ────────────────────────────────
    function download() {
      const link = document.createElement('a');
      link.download = 'icon.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
