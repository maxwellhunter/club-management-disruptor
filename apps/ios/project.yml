name: ClubOS
options:
  bundleIdPrefix: com.clubos
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: F2VKRSRXTV
    GENERATE_INFOPLIST_FILE: false
    INFOPLIST_FILE: ClubOS/Info.plist

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

targets:
  ClubOS:
    type: application
    platform: iOS
    sources:
      - ClubOS
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clubos.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        INFOPLIST_FILE: ClubOS/Info.plist
    entitlements:
      path: ClubOS/ClubOS.entitlements

  ClubOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ClubOSTests
    dependencies:
      - target: ClubOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clubos.app.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ClubOS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ClubOS"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: ""
